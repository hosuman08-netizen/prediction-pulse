<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prediction Pulse</title>
<style>
body{background:#0b0a10;color:#ece8f1;font-family:system-ui,sans-serif;padding:20px;margin:0}
h1{color:#e0b552;font-size:1.4rem}
.card{background:#15131d;border:1px solid #2a2438;border-radius:14px;padding:14px;margin:12px 0}
button{width:100%;padding:12px;border:0;border-radius:10px;background:#e0b552;color:#111;font-weight:800;margin-top:8px;cursor:pointer}
.dim{color:#8a8398;font-size:12px}
.yes{color:#67e8f9}.no{color:#f9a8d4}
</style></head><body>
<h1>Prediction Pulse</h1>
<p class="dim">p26 · 예측 카드 시뮬 · 엔터테인먼트 · 실투자 아님</p>
<div class="card">
  <div id="q" style="font-size:16px;margin-bottom:10px"></div>
  <div class="dim" id="timer"></div>
  <button id="yes">YES · 오른다 / 된다</button>
  <button id="no" style="background:#3d3550;color:#ece8f1">NO · 안 된다</button>
  <div id="res" style="margin-top:12px;font-size:14px"></div>
</div>
<p class="dim">실전 예측시장은 별도 플랫폼 · 여기는 연습/재미</p>
<script>window.LEGION_APP='prediction-pulse';window.LEGION_ANALYTICS_URL='https://legion-analytics.hoyashi95.workers.dev';</script>
<script src="legion-beacon.js"></script>
<script>
const QS=[
  '이번 주 BTC가 주초 대비 상승 마감?',
  '내일 비(비 소식) 이슈가 피드 상위?',
  '이번 시즌 신작 게임 화제성 YES?',
  'AI 관련 주가/테마 주간 모멘텀 유지?'
];
let i=Math.floor(Math.random()*QS.length), picks=JSON.parse(localStorage.getItem('p26p')||'[]');
function render(){
  document.getElementById('q').textContent=QS[i];
  const end=new Date();end.setHours(24,0,0,0);
  const m=Math.max(0,Math.floor((end-Date.now())/60000));
  document.getElementById('timer').textContent='⏱ 오늘 창 '+Math.floor(m/60)+'h '+(m%60)+'m · FOMO';
}
function pick(side){
  picks.push({q:QS[i],side,t:Date.now()});
  localStorage.setItem('p26p',JSON.stringify(picks.slice(-50)));
  document.getElementById('res').innerHTML='기록: <span class="'+(side==='yes'?'yes':'no')+'">'+side.toUpperCase()+'</span> · 스트릭 연습 '+(picks.length);
  try{legionTrack('activate',{side})}catch(e){}
  i=(i+1)%QS.length; setTimeout(render,400);
}
document.getElementById('yes').onclick=()=>pick('yes');
document.getElementById('no').onclick=()=>pick('no');
render();
try{legionTrack('session_start',{})}catch(e){}
setInterval(render,60000);
</script>

<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){});}</script>

</body></html>
